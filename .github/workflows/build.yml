name: Build PortalX Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.21

      - name: Build Windows EXE
        run: |
          GOOS=windows GOARCH=amd64 go build -o portalx.exe main.go

      - name: Upload EXE
        uses: actions/upload-artifact@v3
        with:
          name: portalx-windows
          path: portalx.exe