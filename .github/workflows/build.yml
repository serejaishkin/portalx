jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Copy bin files
        shell: powershell
        run: |
          mkdir bin -ErrorAction SilentlyContinue
          copy bin\sing-box.exe bin\sing-box.exe -Force
          copy bin\WinDivert64.sys bin\WinDivert64.sys -Force
          copy bin\windivertctl.exe bin\windivertctl.exe -Force

      - name: Build PortalX
        run: go build -o portalx.exe main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: portalx-windows
          path: |
            portalx.exe
            bin/sing-box.exe
            bin/WinDivert64.sys
            bin/windivertctl.exe