name: Build PortalX Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1️⃣ Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Настраиваем Go
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      # 3️⃣ Создаём папку bin и копируем бинарники Windows
    - name: Copy bin files
  shell: powershell
  run: |
    mkdir bin -ErrorAction SilentlyContinue
    copy bin\sing-box.exe bin\sing-box.exe -Force
    copy bin\WinDivert64.sys bin\WinDivert64.sys -Force
    copy bin\windivertctl.exe bin\windivertctl.exe -Force

      # 4️⃣ Сборка PortalX.exe через Go
      - name: Build PortalX
        run: go build -o portalx.exe main.go

      # 5️⃣ Загружаем артефакт для скачивания
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: portalx-windows
          path: |
            portalx.exe
            bin/sing-box.exe
            bin/WinDivert64.sys
            bin/windivertctl.exe