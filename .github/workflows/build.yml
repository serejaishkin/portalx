name: build

on:
  push:
    branches: [ main ]

jobs:

  build:

    runs-on: windows-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: go mod tidy

      - name: Build
        run: go build -o portalx.exe

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: portalx
          path: portalx.exe